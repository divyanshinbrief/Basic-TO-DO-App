<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./Assets/logo.png">
    <link rel="stylesheet" href="todo.css">
    <title>Basic TO-DO App</title>
</head>
<body>
    <h1>Basic To-do App</h1>
    <div id="mainContainer">
        <div id="entryContainer">
            <input type="text" placeholder="Add Your Task" id="input">
            <button type="button" class="btn btn-success">Add</button>
        </div>
        <div id="filter">
            <label for="filter">Filter Out</label>
            <select name="filterBase" id="Filter">
                <option value="All">All</option>
                <option value="Completed">Completed✅</option>
                <option value="notCompletedYet">Not Completed Yet!</option>
            </select>
            <button>Filter</button>
        </div>

        <!-- list of todo items -->
        <div id="listContainer">
            
        </div>
    </div>
    <script src="todo.js"></script>
</body>
</html>
